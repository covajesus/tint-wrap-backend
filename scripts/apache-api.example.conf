# Fragmento para Apache delante de uvicorn (api.tint-wrap.com).
# Ajusta el puerto al de tu servicio (ej. 8000).

# Proxy hacia FastAPI
# ProxyPass / http://127.0.0.1:8000/
# ProxyPassReverse / http://127.0.0.1:8000/

# Si uvicorn está caído, Apache devuelve 503 SIN cabeceras CORS → el navegador muestra error CORS.
# Comprueba el servicio: sudo systemctl status tw

# Opcional: CORS en Apache cuando el backend no responde (sustituto, no ideal):
# SetEnvIf Origin "^https://(admin\.)?tint-wrap\.com$" CORS=1
# Header always set Access-Control-Allow-Origin "%{HTTP:Origin}e" env=CORS
# Header always set Access-Control-Allow-Credentials "true" env=CORS
